name: CI

on:
  push:
    branches:
      - 'main'
      - 'use-docker-build-push-action'
  pull_request:

jobs:
  build:
    uses: powsybl/github-ci/.github/workflows/build-frontend-app-generic.yml@08aedee6a65c73d4eb05a72e37dfb7a538fec0e7
    with:
      dockerImage: gridsuite/gridstudy-app
      dockerUsername: gridsuiteci
      eventType: gridstudy_app_updated
      licensercPath: .github/config/.licenserc.yaml
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      repo-token: ${{ secrets.REPO_ACCESS_TOKEN }}
