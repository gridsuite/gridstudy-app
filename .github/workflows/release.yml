name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: Release version (vX.X)
        required: true
        type: string

jobs:
  run-release:
    uses: powsybl/github-ci/.github/workflows/release-frontend-app-generic.yml@f078f32800ad0555275dedb3e200f87ad1560a83
    with:
      releaseVersion: ${{ github.event.inputs.releaseVersion }}
      dockerImage: docker.io/gridsuite/gridstudy-app
      dockerUsername: gridsuiteci
      githubappId: ${{ vars.GRIDSUITE_ACTIONS_APPID }}
    secrets:
      VERSIONBUMP_GHAPP_PRIVATE_KEY: ${{ secrets.VERSIONBUMP_GHAPP_PRIVATE_KEY }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      sonar-token: ${{ secrets.SONAR_TOKEN }}
